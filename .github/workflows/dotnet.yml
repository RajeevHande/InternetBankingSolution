name: .NET Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore InternetBankingSolution.sln

    - name: Build solution
      run: dotnet build InternetBankingSolution.sln --no-restore --configuration Release

    - name: Run tests
      run: dotnet test InternetBankingSolution.sln --no-build --verbosity normal
